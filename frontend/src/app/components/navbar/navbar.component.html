<!-- NAVBAR (HIDDEN ON LOGIN/SIGNUP) -->
<nav class="navbar" style="display: flex !important;" *ngIf="isLoggedIn">
  <div class="navbar-container">

    <!-- HAMBURGER (MOBILE/TABLET ONLY) -->
    <button class="menu-toggle" (click)="isMenuOpen = true" *ngIf="isLoggedIn">
      ☰
    </button>

    <i class="fa fa-home home-icon" title="Home" routerLink="/home" *ngIf="isLoggedIn">
    </i>


    <!-- BRAND -->
    <div class="navbar-brand">
      <a [routerLink]="isLoggedIn ? '/home' : '/login'">Employee main</a>
    </div>
    <!-- HOME ICON -->

  </div>


  <!-- DESKTOP NAV -->
  <div class="desktop-nav" *ngIf="isLoggedIn">

    <!-- MASTER -->
    <select class="nav-select" (change)="navigate($event)">
      <option value="" disabled selected hidden>Master</option>
      <option value="/employees">Employees</option>
      <option value="/users">Users</option>
      <option value="/price-list">Price List</option>
      <option value="/root-master">Root Master</option>
      <option value="/user-details">User Details</option>
      <option value="/products">Products</option>
      <option value="/projects">Project</option>
      <option value="/leads">Lead</option>
    </select>

    <select class="nav-select" (change)="navigate($event)">
      <option value="" disabled selected hidden>Production</option>
      <option value="/production-entry">Production</option>
      <option value="/casting-hall-report">Casting</option>
      <option value="/wire-cutting-report">Cutting</option>
      <option value="/autoclave">Autoclave</option>
      <option value="/block-separating">Block Separating</option>
      <option value="/cube-test">Cube Test</option>
      <option value="/rejection">Rejection</option>
      <option value="/production-dashboard">Production Dashboard</option>
      <option value="/horizontal-report">📊 Horizontal Report</option>
    </select>


    <!-- TRANSACTION -->
    <select class="nav-select" (change)="navigate($event)">
      <option value="" disabled selected hidden>Transaction details</option>
      <option value="/inquiries">Inquiry</option>
      <option value="/inquiry-schedule">Schedule</option>
      <option value="/purchase-orders">Purchase</option>
      <option value="/sell-orders">Sale</option>
      <option value="/receipts">Receipt</option>
      <option value="/customers">Batch</option>
      <option value="/km-list">Travel Details</option>
      <option value="/transaction-export">Transaction Export</option>
    </select>

    <!-- SETTINGS -->
    <select class="nav-select" (change)="navigate($event)">
      <option value="" disabled selected hidden>Settings</option>
      <option value="/state-master">State</option>
      <option value="/district-master">Dist</option>
      <option value="/taluka-master">Taluka</option>
      <option value="/city-master">City</option>
    </select>


    <!-- USER INFO -->
    <div class="user-info">
      <span class="username" (click)="openProfile()">
        {{ currentUser?.username }}
      </span>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>

  </div>
</nav>

<!-- MOBILE OVERLAY -->
<div class="overlay" *ngIf="isMenuOpen && isLoggedIn" (click)="isMenuOpen = false">
</div>
